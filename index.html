<!-- Firebase via CDN (script tag, no npm needed) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, deleteDoc, collection, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCbl_I6juuAw72FxVy57pM5X5yUTJb_q9U",
  authDomain: "concorde-fire-tracker.firebaseapp.com",
  projectId: "concorde-fire-tracker",
  storageBucket: "concorde-fire-tracker.firebasestorage.app",
  messagingSenderId: "187968143452",
  appId: "1:187968143452:web:95768bd2e7283a68182699"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getFirestore(firebaseApp, 'cf-db');

// ─── FIREBASE API (exposed to window) ────────────────────────────────────────
window.FB = {
  // Players
  async savePLayer(player) {
    await setDoc(doc(db, 'players', player.id), player);
  },
  async deletePlayer(playerId) {
    await deleteDoc(doc(db, 'players', playerId));
    // delete all workouts for this player
    // (Firestore doesn't cascade — we mark deleted)
    await setDoc(doc(db, 'deleted_players', playerId), { deletedAt: serverTimestamp() });
  },
  listenPlayers(callback) {
    return onSnapshot(collection(db, 'players'), snap => {
      const players = [];
      snap.forEach(d => players.push(d.data()));
      players.sort((a,b) => (a.createdAt||'').localeCompare(b.createdAt||''));
      callback(players);
    });
  },

  // Workouts
  async saveWorkout(playerId, workoutId, phaseIdx, weekNum, data) {
    const key = `${playerId}_${phaseIdx}_w${weekNum}_${workoutId}`;
    await setDoc(doc(db, 'workouts', key), { playerId, workoutId, phaseIdx, weekNum, ...data });
  },
  async removeWorkout(playerId, workoutId, phaseIdx, weekNum) {
    const key = `${playerId}_${phaseIdx}_w${weekNum}_${workoutId}`;
    await deleteDoc(doc(db, 'workouts', key));
  },
  listenWorkouts(callback) {
    return onSnapshot(collection(db, 'workouts'), snap => {
      const workouts = {};
      snap.forEach(d => { workouts[d.id] = d.data(); });
      callback(workouts);
    });
  },

  // Weight
  async logWeight(playerId, lbs) {
    const key = `${playerId}_${Date.now()}`;
    await setDoc(doc(db, 'weights', key), { playerId, lbs, date: new Date().toISOString().split('T')[0], ts: Date.now() });
  },
  listenWeights(callback) {
    return onSnapshot(collection(db, 'weights'), snap => {
      const weights = {};
      snap.forEach(d => {
        const data = d.data();
        if (!weights[data.playerId]) weights[data.playerId] = [];
        weights[data.playerId].push(data);
      });
      Object.keys(weights).forEach(pid => weights[pid].sort((a,b) => b.ts - a.ts));
      callback(weights);
    });
  }
};

// Signal app that Firebase is ready
window._fbReady = true;
window.dispatchEvent(new Event('fb-ready'));
</script>

let currentWeekNum = parseInt(localStorage.getItem('cf_week')||'1');

// Cloud data (updated by Firestore listeners)

function setSyncing(v) {
  isSyncing = v;
  const dot = document.getElementById('sync-dot');
  if (dot) dot.className = v ? 'syncing' : '';
}

// ─── INIT — wait for Firebase ─────────────────────────────────────────────────
function initApp() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  // Start Firestore listeners — real-time sync
  window.FB.listenPlayers(players => {
    cloudPlayers = players;
    // Auto-select first player if none selected
    if (!activePlayerId && players.length > 0) {
      activePlayerId = players[0].id;
      localStorage.setItem('cf_active_player', activePlayerId);
    }
    render();
  });
  window.FB.listenWorkouts(workouts => {
    cloudWorkouts = workouts;
    render();
  });
  window.FB.listenWeights(weights => {
    cloudWeights = weights;
    render();
  });
}

if (window._fbReady) {
  initApp();
} else {
  window.addEventListener('fb-ready', initApp);
  // Timeout fallback
  setTimeout(() => {
    if (!window._fbReady) {
      document.getElementById('loading').querySelector('p').textContent = 'Could not connect. Check your internet connection.';
      document.getElementById('sync-dot') && (document.getElementById('sync-dot').className = 'offline');
    }
  }, 10000);
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function getActivePlayer() { return cloudPlayers.find(p=>p.id===activePlayerId)||null; }
function getEntry(playerId, workoutId, phaseIdx, weekNum) {
  return cloudWorkouts[`${playerId}_${phaseIdx}_w${weekNum}_${workoutId}`] || null;
}
function getWeightLog(playerId) { return cloudWeights[playerId] || []; }

// ─── TABS ─────────────────────────────────────────────────────────────────────
function showTab(tab) {
  currentTab = tab;
  ['today','program','progress','team'].forEach(t => document.getElementById(`tab-${t}`).classList.toggle('active', t===tab));
  render();
}
function render() {
  const el = document.getElementById('content');

  else if (currentTab==='program') el.innerHTML = renderPlayerBar() + renderProgram();

  else el.innerHTML = renderTeam();
}

// ─── PLAYER BAR ───────────────────────────────────────────────────────────────

// ─── TODAY ────────────────────────────────────────────────────────────────────
function renderToday() {
  const player = getActivePlayer();
  if (!player) return renderNoPlayer();
  const phase = PROGRAM[currentPhaseIndex];
  const dayData = phase.days[currentDayIndex];
  const dayNames = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const dateStr = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const done = dayData.workouts.filter(w=>{ const e=getEntry(player.id,w.id,currentPhaseIndex,currentWeekNum); return e&&e.completed; }).length;
  const total = dayData.workouts.length;
  const pct = total>0?Math.round((done/total)*100):0;
  const circ = 2*Math.PI*28;
  const offset = circ-(circ*pct/100);
  const streak = calcStreak(player.id);

  let html = `<div class="page-header"><h1>${dateStr}</h1></div>
  <div class="phase-selector">
    ${PROGRAM.map((p,i)=>`<button class="phase-btn${i===currentPhaseIndex?' active':''}" onclick="setPhase(${i})">Wk ${p.weeks}<br><span style="font-weight:500;font-size:10px">${p.phase}</span></button>`).join('')}
  </div>
  <div style="display:flex;gap:6px;padding:8px 16px 0">
    <button class="phase-btn${currentWeekNum===1?' active':''}" onclick="setWeek(1)" style="font-size:13px;padding:8px">Week 1</button>
    <button class="phase-btn${currentWeekNum===2?' active':''}" onclick="setWeek(2)" style="font-size:13px;padding:8px">Week 2</button>
  </div>`;

  if (streak>0) html += `<div class="streak-banner">
    <div class="streak-num">${streak}</div>
    <div><div style="font-size:13px;font-weight:600">Day${streak!==1?'s':''} with workouts logged</div><div style="font-size:11px;color:var(--muted);margin-top:2px">Keep it going 🔥</div></div>
  </div>`;

  html += `<div class="day-nav">
    <button class="day-nav-btn" onclick="navDay(-1)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg></button>
    <div class="day-nav-center">
      <div class="today-ring">
        <svg width="70" height="70" viewBox="0 0 70 70">
          <circle class="ring-track" cx="35" cy="35" r="28"/>
          <circle class="ring-fill" cx="35" cy="35" r="28" stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>
        </svg>
        <div class="ring-text">${pct}%</div>
      </div>
      <div class="day-nav-label">${dayNames[currentDayIndex]}</div>
      <div class="day-nav-date">${done}/${total} done</div>
    </div>
    <button class="day-nav-btn" onclick="navDay(1)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></button>
  </div>
  <div class="card">`;
  dayData.workouts.forEach(w => {
    const entry = getEntry(player.id, w.id, currentPhaseIndex, currentWeekNum);
    const isDone = entry && entry.completed;
    html += `<div class="workout-row" onclick="openModal('${w.id}',${currentPhaseIndex},${currentWeekNum})">
      <div class="check-circle${isDone?' done':''}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0A0A0A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div class="workout-info">
        <div class="workout-name${isDone?' done':''}">${w.name}</div>
        <div class="workout-tip">${w.tip.substring(0,85)}${w.tip.length>85?'…':''}</div>
        ${entry&&entry.score?`<div class="workout-score">📊 ${entry.score}</div>`:''}
      </div>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${isDone?'var(--gold)':'var(--border)'}" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
    </div>`;
  });
  html += `</div>`;
  return html;
}

function renderNoPlayer() {
  return `<div class="no-player"><div class="no-player-icon">⚽</div><h2>No Players Yet</h2><p>Add players to start tracking workouts for your team.</p><button class="btn-add-first" onclick="openPModal()">+ Add First Player</button></div>`;
}
function setPhase(i) { currentPhaseIndex=i; currentWeekNum=1; localStorage.setItem('cf_phase',i); localStorage.setItem('cf_week',1); render(); }
function setWeek(w) { currentWeekNum=w; localStorage.setItem('cf_week',w); render(); }
function navDay(dir) { currentDayIndex=(currentDayIndex+7+dir)%7; render(); }
function calcStreak(playerId) {
  const doneDays = new Set(Object.values(cloudWorkouts).filter(e=>e.playerId===playerId&&e.completed&&e.date).map(e=>e.date));
  let streak=0; const today=new Date(); today.setHours(0,0,0,0);
  for (let i=0;i<60;i++) {
    const d=new Date(today); d.setDate(d.getDate()-i);
    const ds=d.toISOString().split('T')[0];
    if (doneDays.has(ds)) streak++; else if (i>0) break;
  }
  return streak;
}

    <div style="flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center">
      <div style="font-size:26px;font-weight:900;color:var(--text)">${totalWorkouts>0?Math.round(totalDone/totalWorkouts*100):0}%</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px">Complete</div>
    </div>
    <div style="flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center">
      <div style="font-size:26px;font-weight:900;color:var(--text)">${weightLog.length>0?weightLog[0].lbs+'lb':'—'}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px">Current Wt</div>
    </div>
  </div>`;

  html += `<div class="section-label">Cooper Test (12-Min Run)</div>
  <div class="chart-wrap"><div class="chart-canvas-wrap">
    <div class="chart-title">Distance Over Time</div>
    <div class="chart-sub">meters · elite: 2800–3200m</div>
    <canvas id="chart-cooper" height="150"></canvas>
  </div></div>`;

  html += `<div class="section-label">Weight Log</div><div class="card">
    <div style="padding:14px 16px;display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:14px;font-weight:600">Log today's weight</div>
      <div style="display:flex;gap:8px;align-items:center">
        <input id="weight-input" type="number" placeholder="lbs" style="width:76px;background:var(--elevated);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:15px;outline:none">
        <button onclick="logWeight()" style="background:var(--gold);color:#0A0A0A;border:none;border-radius:8px;padding:8px 14px;font-weight:700;font-size:14px;cursor:pointer">Log</button>
      </div>
    </div>
    ${weightLog.length>0 ? weightLog.slice(0,8).map((entry,i)=>{
      const prev=weightLog[i+1]; const diff=prev?(entry.lbs-prev.lbs):null;
      return `<div class="weight-row">
        <span class="weight-val">${entry.lbs} lb</span>
        <span class="weight-date">${entry.date}</span>
        ${diff!==null?`<span class="weight-change ${diff>0?'up':'down'}">${diff>0?'+':''}${diff.toFixed(1)} lb</span>`:''}
      </div>`;
    }).join('') : '<div style="padding:14px 16px;color:var(--muted);font-size:13px">No weight entries yet</div>'}
  </div>`;

  let hasAny = false;

async function logWeight() {
  const player = getActivePlayer();

  const val = parseFloat(document.getElementById('weight-input').value);

  setSyncing(true);

// ─── WORKOUT MODAL ────────────────────────────────────────────────────────────
function openModal(workoutId, phaseIdx, weekNum) {
  const player = getActivePlayer();
  if (!player) return;
  let workout = null;
  PROGRAM[phaseIdx].days.forEach(d=>d.workouts.forEach(w=>{ if(w.id===workoutId) workout=w; }));
  if (!workout) return;
  modalWorkout=workout; modalPhaseIdx=phaseIdx; modalWeekNum=weekNum;
  const entry = getEntry(player.id, workoutId, phaseIdx, weekNum)||{};
  document.getElementById('modal-title').textContent = workout.name;
  document.getElementById('modal-player').textContent = player.name;
  document.getElementById('modal-tip').textContent = workout.tip;
  const ss = document.getElementById('modal-score-section');
  if (workout.record) { ss.style.display='block'; document.getElementById('modal-score-label').textContent=workout.record; document.getElementById('modal-score-input').value=entry.score||''; }
  else ss.style.display='none';
  document.getElementById('modal-notes-input').value = entry.notes||'';
  const isDone = entry&&entry.completed;
  document.getElementById('modal-actions').innerHTML = isDone
    ? `<button class="btn btn-danger" onclick="unmarkWorkout()">Mark Incomplete</button><button class="btn btn-primary" onclick="saveWorkout()">Update</button>`
    : `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveWorkout()">Mark Complete</button>`;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e) {
  if (e&&e.target!==document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
}
async function saveWorkout() {
  const player = getActivePlayer();
  if (!modalWorkout||!player) return;
  const score = document.getElementById('modal-score-input').value.trim();
  const notes = document.getElementById('modal-notes-input').value.trim();
  document.getElementById('modal-overlay').classList.remove('open');
  setSyncing(true);
  await window.FB.saveWorkout(player.id, modalWorkout.id, modalPhaseIdx, modalWeekNum, { completed:true, score, notes, date:new Date().toISOString().split('T')[0] });
  setSyncing(false);
  modalWorkout=null;
}
async function unmarkWorkout() {
  const player = getActivePlayer();
  if (!modalWorkout||!player) return;
  document.getElementById('modal-overlay').classList.remove('open');
  setSyncing(true);
  await window.FB.removeWorkout(player.id, modalWorkout.id, modalPhaseIdx, modalWeekNum);
  setSyncing(false);
  modalWorkout=null;
}

// ─── PLAYER MODAL ─────────────────────────────────────────────────────────────
function openPModal(playerId) {
  editingPlayerId = playerId||null;
  const player = playerId ? cloudPlayers.find(p=>p.id===playerId) : null;
  document.getElementById('pmodal-title').textContent = player?'Edit Player':'Add Player';
  document.getElementById('pmodal-name').value = player?player.name:'';
  document.getElementById('pmodal-weight').value = player?(player.weight||''):'';  
  document.getElementById('pmodal-delete-wrap').style.display = player?'block':'none';
  document.getElementById('pmodal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('pmodal-name').focus(),350);
}
function closePModal(e) {
  if (e&&e.target!==document.getElementById('pmodal-overlay')) return;
  document.getElementById('pmodal-overlay').classList.remove('open');
  editingPlayerId=null;
}
async function savePlayer() {
  const name = document.getElementById('pmodal-name').value.trim();
  const weight = parseFloat(document.getElementById('pmodal-weight').value)||null;
  if (!name) return;
  document.getElementById('pmodal-overlay').classList.remove('open');
  setSyncing(true);
  if (editingPlayerId) {
    const existing = cloudPlayers.find(p=>p.id===editingPlayerId)||{};
    await window.FB.savePLayer({ ...existing, name, weight });
  } else {
    const id = 'p'+Date.now();
    await window.FB.savePLayer({ id, name, weight, createdAt: new Date().toISOString() });
    if (weight) await window.FB.logWeight(id, weight);
    activePlayerId=id; localStorage.setItem('cf_active_player',id);
  }
  setSyncing(false);
  editingPlayerId=null;
}
async function deletePlayer() {
  if (!editingPlayerId) return;
  if (!confirm('Remove this player and all their data?')) return;
  document.getElementById('pmodal-overlay').classList.remove('open');
  setSyncing(true);
  await window.FB.deletePlayer(editingPlayerId);
  if (activePlayerId===editingPlayerId) { activePlayerId=cloudPlayers.find(p=>p.id!==editingPlayerId)?.id||null; localStorage.setItem('cf_active_player',activePlayerId||''); }
  setSyncing(false);
  editingPlayerId=null;
}

// ─── CHARTS ───────────────────────────────────────────────────────────────────
function drawCharts() {
  const player = getActivePlayer();
  if (!player) return;
  const cooperData = [{label:'Wk 1–2',id:'w1_sun_b',pi:0},{label:'Wk 3–4',id:'w3_sun_b',pi:1},{label:'Wk 5–6',id:'w5_sun_b',pi:2}];
  const vals = cooperData.map(d=>{ const e=getEntry(player.id,d.id,d.pi); if(!e||!e.score) return null; const m=e.score.match(/\d+/); return m?parseInt(m[0]):null; });
  drawLineChart('chart-cooper', cooperData.map(d=>d.label), vals, '#C9A84C', 2000, 3500);
}
function drawLineChart(canvasId, labels, values, color, minY, maxY) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const dpr=window.devicePixelRatio||1; const W=canvas.offsetWidth||300; const H=150;
  canvas.width=W*dpr; canvas.height=H*dpr;
  const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);
  const pad={top:16,right:20,bottom:30,left:48}; const cW=W-pad.left-pad.right; const cH=H-pad.top-pad.bottom;
  ctx.clearRect(0,0,W,H);
  const valid=values.filter(v=>v!==null);
  const yMin=valid.length?Math.min(minY,Math.min(...valid)*0.97):minY;
  const yMax=valid.length?Math.max(maxY,Math.max(...valid)*1.03):maxY;
  const xPos=i=>pad.left+(i/(labels.length-1))*cW;
  const yPos=v=>pad.top+cH-((v-yMin)/(yMax-yMin))*cH;
  ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=1;
  for(let i=0;i<=4;i++){const y=pad.top+(cH/4)*i;ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+cW,y);ctx.stroke();}
  ctx.fillStyle='rgba(136,136,136,0.8)'; ctx.font='10px -apple-system'; ctx.textAlign='right';
  for(let i=0;i<=2;i++){const v=yMin+((yMax-yMin)/2)*i;ctx.fillText(Math.round(v),pad.left-6,yPos(v)+3);}
  ctx.textAlign='center'; labels.forEach((l,i)=>ctx.fillText(l,xPos(i),H-6));
  if(valid.length===0){ctx.fillStyle='rgba(136,136,136,0.5)';ctx.font='12px -apple-system';ctx.textAlign='center';ctx.fillText('Complete Cooper Tests to see chart',W/2,H/2);return;}
  const pts=values.map((v,i)=>v!==null?{x:xPos(i),y:yPos(v)}:null);
  const vpts=pts.filter(p=>p!==null);
  if(vpts.length>=1){
    const grad=ctx.createLinearGradient(0,pad.top,0,pad.top+cH);
    grad.addColorStop(0,color+'35');grad.addColorStop(1,'transparent');
    ctx.beginPath();ctx.fillStyle=grad;ctx.moveTo(vpts[0].x,pad.top+cH);
    vpts.forEach(p=>ctx.lineTo(p.x,p.y));ctx.lineTo(vpts[vpts.length-1].x,pad.top+cH);ctx.closePath();ctx.fill();
    if(vpts.length>=2){ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.lineCap='round';vpts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.stroke();}
    vpts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,5,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();ctx.strokeStyle='#0A0A0A';ctx.lineWidth=2;ctx.stroke();});
    ctx.fillStyle=color;ctx.font='bold 11px -apple-system';ctx.textAlign='center';
    vpts.forEach(p=>{const v=values[pts.indexOf(p)];ctx.fillText(Math.round(v),p.x,p.y-10);});
  }
}
