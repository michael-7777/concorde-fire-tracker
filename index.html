<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CF Trainer">
<meta name="theme-color" content="#C9A84C">
<title>Concorde Fire — Pre-Season</title>
<style>
  :root {
    --bg: #0A0A0A; --card: #181818; --elevated: #242424; --border: #2E2E2E;
    --gold: #C9A84C; --gold-dim: #8A6E2A; --red: #C0392B;
    --text: #E8E8E8; --muted: #888888;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; overflow: hidden; }
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
  #content { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding-bottom: calc(68px + var(--safe-bottom)); }
  #content::-webkit-scrollbar { display: none; }

  /* Nav */
  #nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(18,18,18,0.96); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; padding-bottom: var(--safe-bottom); z-index: 100; }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 0; border: none; background: none; color: var(--muted); font-size: 10px; font-weight: 500; letter-spacing: 0.5px; cursor: pointer; transition: color 0.2s; }
  .nav-btn.active { color: var(--gold); }
  .nav-btn svg { width: 22px; height: 22px; }

  /* Page header */
  .page-header { padding: calc(var(--safe-top) + 14px) 16px 14px; border-bottom: 1px solid var(--border); }
  .page-header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  .page-header .sub { font-size: 13px; color: var(--muted); margin-top: 2px; }

  /* Player bar */
  #player-bar { background: var(--card); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; flex-shrink: 0; }
  #player-bar::-webkit-scrollbar { display: none; }
  .player-chip { display: flex; align-items: center; gap: 6px; padding: 7px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--elevated); color: var(--muted); font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer; flex-shrink: 0; transition: all 0.15s; }
  .player-chip.active { border-color: var(--gold); background: rgba(201,168,76,0.12); color: var(--gold); }
  .player-chip .avatar { width: 22px; height: 22px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: var(--text); flex-shrink: 0; }
  .player-chip.active .avatar { background: var(--gold); color: #0A0A0A; }
  .add-player-chip { display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 50%; border: 1px dashed var(--border); background: none; color: var(--muted); cursor: pointer; flex-shrink: 0; font-size: 20px; line-height: 1; }

  /* Cards */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; margin: 0 16px 12px; overflow: hidden; }

  /* Workout rows */
  .workout-row { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; border-top: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
  .workout-row:active { background: var(--elevated); }
  .check-circle { width: 28px; height: 28px; min-width: 28px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; transition: all 0.2s; margin-top: 1px; }
  .check-circle.done { background: var(--gold); border-color: var(--gold); }
  .check-circle svg { display: none; }
  .check-circle.done svg { display: block; }
  .workout-info { flex: 1; min-width: 0; }
  .workout-name { font-size: 15px; font-weight: 600; }
  .workout-name.done { color: var(--muted); text-decoration: line-through; }
  .workout-tip { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.5; }
  .workout-score { font-size: 12px; color: var(--gold); margin-top: 4px; font-weight: 600; }

  /* Day nav */
  .day-nav { display: flex; align-items: center; gap: 8px; padding: 14px 16px 10px; }
  .day-nav-btn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); background: var(--card); color: var(--text); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
  .day-nav-center { flex: 1; text-align: center; }
  .day-nav-label { font-size: 17px; font-weight: 700; }
  .day-nav-date { font-size: 12px; color: var(--muted); margin-top: 1px; }

  /* Ring */
  .today-ring { width: 70px; height: 70px; position: relative; margin: 0 auto 4px; }
  .today-ring svg { transform: rotate(-90deg); }
  .ring-track { fill: none; stroke: var(--border); stroke-width: 5; }
  .ring-fill { fill: none; stroke: var(--gold); stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 0.5s ease; }
  .ring-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; color: var(--gold); }

  /* Phase selector */
  .phase-selector { display: flex; gap: 6px; padding: 12px 16px 0; }
  .phase-btn { flex: 1; padding: 8px 4px; border-radius: 8px; border: 1px solid var(--border); background: var(--elevated); color: var(--muted); font-size: 11px; font-weight: 700; cursor: pointer; text-align: center; line-height: 1.4; }
  .phase-btn.active { border-color: var(--gold); background: rgba(201,168,76,0.12); color: var(--gold); }

  /* Section label */
  .section-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; padding: 20px 20px 8px; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--card); border-radius: 20px 20px 0 0; border-top: 1px solid var(--border); padding: 0 0 calc(var(--safe-bottom) + 8px); width: 100%; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1); max-height: 88vh; overflow-y: auto; }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
  .modal-title { font-size: 18px; font-weight: 700; padding: 16px 20px 6px; }
  .modal-player { font-size: 13px; color: var(--gold); font-weight: 600; padding: 0 20px 10px; }
  .modal-tip { font-size: 14px; color: var(--muted); line-height: 1.6; padding: 0 20px 16px; border-bottom: 1px solid var(--border); }
  .modal-section { padding: 14px 20px; }
  .modal-section label { font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; display: block; margin-bottom: 8px; }
  .modal-input { width: 100%; background: var(--elevated); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-size: 16px; font-family: inherit; outline: none; resize: none; }
  .modal-input:focus { border-color: var(--gold); }
  .modal-actions { display: flex; gap: 8px; padding: 4px 20px 8px; flex-wrap: wrap; }
  .btn { flex: 1; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 700; border: none; cursor: pointer; transition: opacity 0.15s; min-width: 100px; }
  .btn:active { opacity: 0.7; }
  .btn-primary { background: var(--gold); color: #0A0A0A; }
  .btn-secondary { background: var(--elevated); color: var(--text); }
  .btn-danger { background: rgba(192,57,43,0.15); color: #e74c3c; border: 1px solid rgba(192,57,43,0.3); }

  /* Player modal */
  .pmodal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index: 300; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .pmodal-overlay.open { opacity: 1; pointer-events: all; }
  .pmodal { background: var(--card); border-radius: 20px 20px 0 0; border-top: 1px solid var(--border); padding: 0 0 calc(var(--safe-bottom) + 8px); width: 100%; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1); }
  .pmodal-overlay.open .pmodal { transform: translateY(0); }

  /* Chart */
  .chart-wrap { padding: 0 16px 16px; }
  .chart-canvas-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; }
  .chart-title { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
  .chart-sub { font-size: 11px; color: var(--muted); margin-bottom: 14px; }
  canvas { display: block; width: 100% !important; }

  /* Streak */
  .streak-banner { margin: 12px 16px 0; background: linear-gradient(135deg, rgba(201,168,76,0.12) 0%, rgba(192,57,43,0.08) 100%); border: 1px solid rgba(201,168,76,0.25); border-radius: 14px; padding: 12px 16px; display: flex; align-items: center; gap: 14px; }
  .streak-num { font-size: 30px; font-weight: 900; color: var(--gold); line-height: 1; }

  /* Empty */
  .empty { text-align: center; padding: 36px 20px; color: var(--muted); font-size: 14px; }
  .empty-icon { font-size: 36px; margin-bottom: 10px; }

  /* No player state */
  .no-player { text-align: center; padding: 60px 24px; }
  .no-player-icon { font-size: 48px; margin-bottom: 16px; }
  .no-player h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .no-player p { font-size: 14px; color: var(--muted); line-height: 1.5; margin-bottom: 24px; }
  .btn-add-first { display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px; background: var(--gold); color: #0A0A0A; border-radius: 12px; font-size: 16px; font-weight: 700; border: none; cursor: pointer; }

  /* Weight history */
  .weight-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; border-top: 1px solid var(--border); }
  .weight-val { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .weight-date { font-size: 12px; color: var(--muted); }
  .weight-change { font-size: 13px; font-weight: 700; }
  .weight-change.up { color: #e74c3c; }
  .weight-change.down { color: #2ecc71; }
</style>
</head>
<body>
<div id="app">
  <div id="content"></div>
  <nav id="nav">
    <button class="nav-btn active" onclick="showTab('today')" id="tab-today">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Today
    </button>
    <button class="nav-btn" onclick="showTab('program')" id="tab-program">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Program
    </button>
    <button class="nav-btn" onclick="showTab('progress')" id="tab-progress">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Progress
    </button>
    <button class="nav-btn" onclick="showTab('team')" id="tab-team">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Team
    </button>
  </nav>
</div>

<!-- Workout Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-player" id="modal-player"></div>
    <div class="modal-tip" id="modal-tip"></div>
    <div class="modal-section" id="modal-score-section" style="display:none">
      <label id="modal-score-label">Score / Time</label>
      <input class="modal-input" id="modal-score-input" type="text" placeholder="e.g. 2750m or 24:30">
    </div>
    <div class="modal-section">
      <label>Notes</label>
      <textarea class="modal-input" id="modal-notes-input" rows="3" placeholder="How did it feel?"></textarea>
    </div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<!-- Player Modal -->
<div class="pmodal-overlay" id="pmodal-overlay" onclick="closePModal(event)">
  <div class="pmodal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="pmodal-title">Add Player</div>
    <div class="modal-section">
      <label>Full Name</label>
      <input class="modal-input" id="pmodal-name" type="text" placeholder="e.g. Alex Johnson">
    </div>
    <div class="modal-section" style="padding-top:0">
      <label>Starting Weight (lbs)</label>
      <input class="modal-input" id="pmodal-weight" type="number" placeholder="e.g. 145">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closePModal()">Cancel</button>
      <button class="btn btn-primary" onclick="savePlayer()">Save Player</button>
    </div>
    <div id="pmodal-delete-wrap" style="padding: 0 20px 8px; display:none">
      <button class="btn btn-danger" style="width:100%" onclick="deletePlayer()">Remove Player</button>
    </div>
  </div>
</div>

// ─── PLAYERS ──────────────────────────────────────────────────────────────────
function getPlayers() {
  try { return JSON.parse(localStorage.getItem('cf_players') || '[]'); } catch { return []; }
}
function savePlayers(players) { localStorage.setItem('cf_players', JSON.stringify(players)); }
function getActivePlayerId() { return localStorage.getItem('cf_active_player') || null; }
function setActivePlayerId(id) { localStorage.setItem('cf_active_player', id); }
function getActivePlayer() {
  const id = getActivePlayerId();
  return getPlayers().find(p => p.id === id) || null;
}

// ─── WORKOUT STORAGE (per player) ────────────────────────────────────────────
function workoutKey(playerId, workoutId, phaseIdx) { return `cf_p${playerId}_${phaseIdx}_${workoutId}`; }
function saveEntry(playerId, workoutId, phaseIdx, data) {
  localStorage.setItem(workoutKey(playerId, workoutId, phaseIdx), JSON.stringify(data));
}
function getEntry(playerId, workoutId, phaseIdx) {
  try { return JSON.parse(localStorage.getItem(workoutKey(playerId, workoutId, phaseIdx))); } catch { return null; }
}
function removeEntry(playerId, workoutId, phaseIdx) {
  localStorage.removeItem(workoutKey(playerId, workoutId, phaseIdx));
}
function getAllEntriesForPlayer(playerId) {
  const all = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith(`cf_p${playerId}_`)) {
      try { all.push({ key: k, data: JSON.parse(localStorage.getItem(k)) }); } catch {}
    }
  }
  return all;
}

// ─── WEIGHT STORAGE ───────────────────────────────────────────────────────────
function weightKey(playerId) { return `cf_weight_${playerId}`; }
function getWeightLog(playerId) {
  try { return JSON.parse(localStorage.getItem(weightKey(playerId)) || '[]'); } catch { return []; }
}
function addWeightEntry(playerId, lbs) {
  const log = getWeightLog(playerId);
  log.unshift({ lbs, date: new Date().toISOString().split('T')[0], ts: Date.now() });
  localStorage.setItem(weightKey(playerId), JSON.stringify(log));
}

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentTab = 'today';
let currentDayIndex = (() => { const d = new Date().getDay(); return d === 0 ? 6 : d - 1; })();
let currentPhaseIndex = parseInt(localStorage.getItem('cf_phase') || '0');
let modalWorkout = null; let modalPhaseIdx = null;
let editingPlayerId = null;

// ─── TABS ─────────────────────────────────────────────────────────────────────
function showTab(tab) {
  currentTab = tab;
  ['today','program','progress','team'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
  });
  render();
}
function render() {
  const el = document.getElementById('content');
  if (currentTab === 'today') el.innerHTML = renderPlayerBar() + renderToday();
  else if (currentTab === 'program') el.innerHTML = renderPlayerBar() + renderProgram();
  else if (currentTab === 'progress') { el.innerHTML = renderPlayerBar() + renderProgress(); drawCharts(); }
  else el.innerHTML = renderTeam();
}

// ─── PLAYER BAR ───────────────────────────────────────────────────────────────
function renderPlayerBar() {
  const players = getPlayers();
  const activeId = getActivePlayerId();
  if (players.length === 0) return '';
  let html = `<div id="player-bar">`;
  players.forEach(p => {
    const initials = p.name.split(' ').map(n=>n[0]).join('').toUpperCase().substring(0,2);
    const isActive = p.id === activeId;
    html += `<div class="player-chip${isActive?' active':''}" onclick="selectPlayer('${p.id}')">
      <div class="avatar">${initials}</div>
      ${p.name.split(' ')[0]}
    </div>`;
  });
  html += `<button class="add-player-chip" onclick="openPModal()" title="Add player">+</button>`;
  html += `</div>`;
  return html;
}

function selectPlayer(id) {
  setActivePlayerId(id);
  render();
}

// ─── TODAY ────────────────────────────────────────────────────────────────────
function renderToday() {
  const player = getActivePlayer();
  if (!player) return renderNoPlayer();

  const phase = PROGRAM[currentPhaseIndex];
  const dayData = phase.days[currentDayIndex];
  const dayNames = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const today = new Date();
  const dateStr = today.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

  const done = dayData.workouts.filter(w => { const e = getEntry(player.id, w.id, currentPhaseIndex); return e && e.completed; }).length;
  const total = dayData.workouts.length;
  const pct = total > 0 ? Math.round((done/total)*100) : 0;
  const circ = 2 * Math.PI * 28;
  const offset = circ - (circ * pct / 100);
  const streak = calcStreak(player.id);

  let html = `<div class="page-header"><h1>${dateStr}</h1></div>`;

  // Phase selector
  html += `<div class="phase-selector">
    ${PROGRAM.map((p,i) => `<button class="phase-btn${i===currentPhaseIndex?' active':''}" onclick="setPhase(${i})">Wk ${p.weeks}<br><span style="font-weight:500;font-size:10px">${p.phase}</span></button>`).join('')}
  </div>`;

  if (streak > 0) {
    html += `<div class="streak-banner">
      <div class="streak-num">${streak}</div>
      <div><div style="font-size:13px;font-weight:600">Day${streak!==1?'s':''} with workouts logged</div><div style="font-size:11px;color:var(--muted);margin-top:2px">Keep it going 🔥</div></div>
    </div>`;
  }

  html += `<div class="day-nav">
    <button class="day-nav-btn" onclick="navDay(-1)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg></button>
    <div class="day-nav-center">
      <div class="today-ring">
        <svg width="70" height="70" viewBox="0 0 70 70">
          <circle class="ring-track" cx="35" cy="35" r="28"/>
          <circle class="ring-fill" cx="35" cy="35" r="28" stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>
        </svg>
        <div class="ring-text">${pct}%</div>
      </div>
      <div class="day-nav-label">${dayNames[currentDayIndex]}</div>
      <div class="day-nav-date">${done}/${total} done</div>
    </div>
    <button class="day-nav-btn" onclick="navDay(1)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></button>
  </div>`;

  html += `<div class="card">`;
  dayData.workouts.forEach(w => {
    const entry = getEntry(player.id, w.id, currentPhaseIndex);
    const isDone = entry && entry.completed;
    html += `<div class="workout-row" onclick="openModal('${w.id}',${currentPhaseIndex})">
      <div class="check-circle${isDone?' done':''}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0A0A0A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="workout-info">
        <div class="workout-name${isDone?' done':''}">${w.name}</div>
        <div class="workout-tip">${w.tip.substring(0,85)}${w.tip.length>85?'…':''}</div>
        ${entry&&entry.score?`<div class="workout-score">📊 ${entry.score}</div>`:''}
      </div>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${isDone?'var(--gold)':'var(--border)'}" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
    </div>`;
  });
  html += `</div>`;
  return html;
}

function renderNoPlayer() {
  return `<div class="no-player">
    <div class="no-player-icon">⚽</div>
    <h2>No Players Yet</h2>
    <p>Add players to start tracking workouts and progress for your team.</p>
    <button class="btn-add-first" onclick="openPModal()">+ Add First Player</button>
  </div>`;
}

function setPhase(idx) { currentPhaseIndex = idx; localStorage.setItem('cf_phase', idx); render(); }
function navDay(dir) { currentDayIndex = (currentDayIndex + 7 + dir) % 7; render(); }

function calcStreak(playerId) {
  const entries = getAllEntriesForPlayer(playerId);
  const doneDays = new Set(entries.filter(e=>e.data&&e.data.completed&&e.data.date).map(e=>e.data.date));
  let streak = 0;
  const today = new Date(); today.setHours(0,0,0,0);
  for (let i = 0; i < 60; i++) {
    const d = new Date(today); d.setDate(d.getDate()-i);
    const ds = d.toISOString().split('T')[0];
    if (doneDays.has(ds)) streak++;
    else if (i > 0) break;
  }
  return streak;
}

// ─── PROGRAM ──────────────────────────────────────────────────────────────────
function renderProgram() {
  const player = getActivePlayer();
  if (!player) return renderNoPlayer();
  let html = `<div class="page-header"><h1>Full Program</h1><div class="sub">6-Week Pre-Season Plan</div></div>`;

    phase.days.forEach(dayData => {
      const done = dayData.workouts.filter(w=>{ const e=getEntry(player.id,w.id,pi); return e&&e.completed; }).length;
      const total = dayData.workouts.length;
      const dots = dayData.workouts.map(w=>{ const e=getEntry(player.id,w.id,pi); return `<div class="prog-dot${e&&e.completed?' done':''}" style="width:8px;height:8px;border-radius:50%;background:${e&&e.completed?'var(--gold)':'var(--border)'}"></div>`; }).join('');
      html += `<div class="card" style="margin-bottom:2px;border-radius:10px" onclick="openDayDetail(${pi},'${dayData.day}')">

          <div><div style="font-size:15px;font-weight:700">${dayData.day}</div></div>
          <div style="display:flex;align-items:center;gap:10px">
            <div style="display:flex;gap:4px">${dots}</div>

function openDayDetail(phaseIdx, dayName) {
  const player = getActivePlayer();

      <div class="check-circle${isDone?' done':''}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0A0A0A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>

}

// ─── PROGRESS ─────────────────────────────────────────────────────────────────
function renderProgress() {
  const player = getActivePlayer();
  if (!player) return renderNoPlayer();
  const weightLog = getWeightLog(player.id);
  const totalDone = getAllEntriesForPlayer(player.id).filter(e=>e.data&&e.data.completed).length;
  const totalWorkouts = PROGRAM.reduce((s,p)=>s+p.days.reduce((sd,d)=>sd+d.workouts.length,0),0);

  let html = `<div class="page-header"><h1>Progress</h1><div class="sub">${player.name}</div></div>`;

  // Stats row
  html += `<div style="display:flex;gap:8px;padding:16px 16px 0">
    <div style="flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center">
      <div style="font-size:26px;font-weight:900;color:var(--gold)">${totalDone}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px">Done</div>
    </div>
    <div style="flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center">
      <div style="font-size:26px;font-weight:900;color:var(--text)">${totalWorkouts>0?Math.round(totalDone/totalWorkouts*100):0}%</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px">Complete</div>
    </div>
    <div style="flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center">
      <div style="font-size:26px;font-weight:900;color:var(--text)">${weightLog.length>0?weightLog[0].lbs+'lb':'—'}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px">Current Wt</div>
    </div>
  </div>`;

  // Cooper chart
  html += `<div class="section-label">Cooper Test (12-Min Run)</div>
  <div class="chart-wrap"><div class="chart-canvas-wrap">
    <div class="chart-title">Distance Over Time</div>
    <div class="chart-sub">meters · elite: 2800–3200m</div>
    <canvas id="chart-cooper" height="150"></canvas>
  </div></div>`;

  // Weight log
  html += `<div class="section-label">Weight Log</div>`;
  html += `<div class="card">
    <div style="padding:14px 16px;display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:14px;font-weight:600">Log today's weight</div>
      <div style="display:flex;gap:8px;align-items:center">
        <input id="weight-input" type="number" placeholder="lbs" style="width:80px;background:var(--elevated);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:15px;outline:none">
        <button onclick="logWeight()" style="background:var(--gold);color:#0A0A0A;border:none;border-radius:8px;padding:8px 14px;font-weight:700;font-size:14px;cursor:pointer">Log</button>
      </div>
    </div>
    ${weightLog.length > 0 ? weightLog.slice(0,8).map((entry, i) => {
      const prev = weightLog[i+1];
      const diff = prev ? (entry.lbs - prev.lbs) : null;
      const changeHtml = diff !== null ? `<span class="weight-change ${diff>0?'up':'down'}">${diff>0?'+':''}${diff.toFixed(1)} lb</span>` : '';
      return `<div class="weight-row">
        <span class="weight-val">${entry.lbs} lb</span>
        <span class="weight-date">${entry.date}</span>
        ${changeHtml}
      </div>`;
    }).join('') : '<div style="padding:14px 16px;color:var(--muted);font-size:13px">No weight entries yet</div>'}
  </div>`;

  // All scores
  html += `<div class="section-label">All Recorded Scores</div>`;
  let hasAny = false;
  PROGRAM.forEach((phase,pi) => {
    phase.days.forEach(dayData => {
      dayData.workouts.forEach(w => {
        if (!w.record) return;
        const e = getEntry(player.id, w.id, pi);
        if (!e||!e.completed) return;
        hasAny = true;
        html += `<div class="card"><div style="padding:14px 16px">
          <div style="font-size:11px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">Week ${phase.weeks} · ${dayData.day}</div>
          <div style="font-size:15px;font-weight:700">${w.name}</div>
          ${e.score?`<div style="font-size:22px;font-weight:900;color:var(--gold);margin-top:8px">${e.score}</div>`:''}
          ${e.notes?`<div style="font-size:13px;color:var(--muted);margin-top:6px">${e.notes}</div>`:''}
        </div></div>`;
      });
    });
  });
  if (!hasAny) html += `<div class="empty"><div class="empty-icon">🏆</div>Scores you record will appear here</div>`;
  html += `<div style="height:20px"></div>`;
  return html;
}

function logWeight() {
  const player = getActivePlayer();
  if (!player) return;
  const val = parseFloat(document.getElementById('weight-input').value);
  if (!val || val < 50 || val > 400) return;
  addWeightEntry(player.id, val);
  render();
}

// ─── TEAM TAB ─────────────────────────────────────────────────────────────────
function renderTeam() {
  const players = getPlayers();
  let html = `<div class="page-header"><h1>Team</h1><div class="sub">${players.length} player${players.length!==1?'s':''}</div></div>`;

    html += `<div class="no-player"><div class="no-player-icon">👥</div><h2>No Players Yet</h2><p>Add players to track their workouts and progress individually.</p><button class="btn-add-first" onclick="openPModal()">+ Add First Player</button></div>`;

        <div style="flex:1;min-width:0">
          <div style="font-size:16px;font-weight:700">${p.name}</div>

        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:18px;font-weight:900;color:var(--gold)">${totalDone}</div>
          <div style="font-size:10px;color:var(--muted)">workouts</div>
        </div>
      </div>
      <div style="margin:0 16px 14px;background:var(--elevated);border-radius:4px;height:4px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:var(--gold);border-radius:4px;transition:width 0.5s ease"></div>
      </div>

  </div>`;

// ─── MODAL (workout) ──────────────────────────────────────────────────────────
function openModal(workoutId, phaseIdx) {
  const player = getActivePlayer();
  if (!player) return;
  let workout = null;
  PROGRAM[phaseIdx].days.forEach(d => d.workouts.forEach(w => { if (w.id===workoutId) workout=w; }));
  if (!workout) return;
  modalWorkout = workout; modalPhaseIdx = phaseIdx;

  const entry = getEntry(player.id, workoutId, phaseIdx) || {};
  document.getElementById('modal-title').textContent = workout.name;
  document.getElementById('modal-player').textContent = player.name;
  document.getElementById('modal-tip').textContent = workout.tip;

  const scoreSection = document.getElementById('modal-score-section');
  if (workout.record) {
    scoreSection.style.display = 'block';
    document.getElementById('modal-score-label').textContent = workout.record;
    document.getElementById('modal-score-input').value = entry.score || '';
  } else {
    scoreSection.style.display = 'none';
  }
  document.getElementById('modal-notes-input').value = entry.notes || '';

  const isDone = entry && entry.completed;
  const actions = document.getElementById('modal-actions');
  if (isDone) {
    actions.innerHTML = `
      <button class="btn btn-danger" onclick="unmarkWorkout()">Mark Incomplete</button>
      <button class="btn btn-primary" onclick="saveWorkout()">Update</button>`;
  } else {
    actions.innerHTML = `
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveWorkout()">Mark Complete</button>`;
  }

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
  modalWorkout = null;
}

function saveWorkout() {
  const player = getActivePlayer();
  if (!modalWorkout || !player) return;
  const score = document.getElementById('modal-score-input').value.trim();
  const notes = document.getElementById('modal-notes-input').value.trim();
  const today = new Date().toISOString().split('T')[0];
  saveEntry(player.id, modalWorkout.id, modalPhaseIdx, { completed: true, score, notes, date: today });
  document.getElementById('modal-overlay').classList.remove('open');
  modalWorkout = null;
  render();
}

function unmarkWorkout() {
  const player = getActivePlayer();
  if (!modalWorkout || !player) return;
  removeEntry(player.id, modalWorkout.id, modalPhaseIdx);
  document.getElementById('modal-overlay').classList.remove('open');
  modalWorkout = null;
  render();
}

// ─── PLAYER MODAL ─────────────────────────────────────────────────────────────
function openPModal(playerId) {
  editingPlayerId = playerId || null;
  const players = getPlayers();
  const player = playerId ? players.find(p=>p.id===playerId) : null;
  document.getElementById('pmodal-title').textContent = player ? 'Edit Player' : 'Add Player';
  document.getElementById('pmodal-name').value = player ? player.name : '';
  document.getElementById('pmodal-weight').value = player ? (player.weight || '') : '';
  document.getElementById('pmodal-delete-wrap').style.display = player ? 'block' : 'none';
  document.getElementById('pmodal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('pmodal-name').focus(), 350);
}

function closePModal(e) {
  if (e && e.target !== document.getElementById('pmodal-overlay')) return;
  document.getElementById('pmodal-overlay').classList.remove('open');
  editingPlayerId = null;
}

function savePlayer() {
  const name = document.getElementById('pmodal-name').value.trim();
  const weight = parseFloat(document.getElementById('pmodal-weight').value) || null;
  if (!name) return;
  const players = getPlayers();
  if (editingPlayerId) {
    const idx = players.findIndex(p=>p.id===editingPlayerId);
    if (idx >= 0) { players[idx].name = name; players[idx].weight = weight; }
  } else {
    const id = 'p' + Date.now();
    players.push({ id, name, weight, createdAt: new Date().toISOString() });
    setActivePlayerId(id);
    if (weight) addWeightEntry(id, weight);
  }
  savePlayers(players);
  document.getElementById('pmodal-overlay').classList.remove('open');
  editingPlayerId = null;
  render();
}

function deletePlayer() {
  if (!editingPlayerId) return;
  if (!confirm('Remove this player? Their workout data will be deleted.')) return;
  let players = getPlayers();
  players = players.filter(p=>p.id!==editingPlayerId);
  savePlayers(players);
  // Clear their data
  const toRemove = [];
  for (let i=0; i<localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && (k.startsWith(`cf_p${editingPlayerId}_`) || k === weightKey(editingPlayerId))) toRemove.push(k);
  }
  toRemove.forEach(k => localStorage.removeItem(k));
  if (getActivePlayerId() === editingPlayerId) setActivePlayerId(players[0]?.id || null);
  document.getElementById('pmodal-overlay').classList.remove('open');
  editingPlayerId = null;
  render();
}

// ─── CHARTS ───────────────────────────────────────────────────────────────────
function drawCharts() {
  const player = getActivePlayer();
  if (!player) return;
  const cooperData = [
    {label:'Wk 1–2', id:'w1_sun_b', pi:0},
    {label:'Wk 3–4', id:'w3_sun_b', pi:1},
    {label:'Wk 5–6', id:'w5_sun_b', pi:2},
  ];
  const vals = cooperData.map(d => {
    const e = getEntry(player.id, d.id, d.pi);
    if (!e||!e.score) return null;
    const m = e.score.match(/\d+/); return m ? parseInt(m[0]) : null;
  });
  drawLineChart('chart-cooper', cooperData.map(d=>d.label), vals, '#C9A84C', 2000, 3500);
}

function drawLineChart(canvasId, labels, values, color, minY, maxY) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth || 300; const H = 150;
  canvas.width = W*dpr; canvas.height = H*dpr;
  const ctx = canvas.getContext('2d'); ctx.scale(dpr,dpr);
  const pad = {top:16,right:20,bottom:30,left:48};
  const cW = W-pad.left-pad.right; const cH = H-pad.top-pad.bottom;
  ctx.clearRect(0,0,W,H);
  const validVals = values.filter(v=>v!==null);
  const yMin = validVals.length ? Math.min(minY, Math.min(...validVals)*0.97) : minY;
  const yMax = validVals.length ? Math.max(maxY, Math.max(...validVals)*1.03) : maxY;
  const xPos = i => pad.left + (i/(labels.length-1))*cW;
  const yPos = v => pad.top + cH - ((v-yMin)/(yMax-yMin))*cH;
  // Grid
  ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=1;
  for (let i=0;i<=4;i++) { const y=pad.top+(cH/4)*i; ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(pad.left+cW,y); ctx.stroke(); }
  // Y labels
  ctx.fillStyle='rgba(136,136,136,0.8)'; ctx.font='10px -apple-system'; ctx.textAlign='right';
  for (let i=0;i<=2;i++) { const v=yMin+((yMax-yMin)/2)*i; const y=yPos(v); ctx.fillText(Math.round(v),pad.left-6,y+3); }
  // X labels
  ctx.textAlign='center';
  labels.forEach((l,i) => ctx.fillText(l,xPos(i),H-6));
  // No data message
  if (validVals.length === 0) {
    ctx.fillStyle='rgba(136,136,136,0.5)'; ctx.font='12px -apple-system'; ctx.textAlign='center';
    ctx.fillText('Complete Cooper Tests to see chart', W/2, H/2); return;
  }
  // Area fill
  const pts = values.map((v,i) => v!==null?{x:xPos(i),y:yPos(v)}:null);
  const vpts = pts.filter(p=>p!==null);
  if (vpts.length >= 1) {
    const grad = ctx.createLinearGradient(0,pad.top,0,pad.top+cH);
    grad.addColorStop(0,color+'35'); grad.addColorStop(1,'transparent');
    ctx.beginPath(); ctx.fillStyle=grad;
    ctx.moveTo(vpts[0].x, pad.top+cH);
    vpts.forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.lineTo(vpts[vpts.length-1].x, pad.top+cH);
    ctx.closePath(); ctx.fill();
    if (vpts.length >= 2) {
      ctx.beginPath(); ctx.strokeStyle=color; ctx.lineWidth=2.5; ctx.lineJoin='round'; ctx.lineCap='round';
      vpts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y)); ctx.stroke();
    }
    vpts.forEach(p => {
      ctx.beginPath(); ctx.arc(p.x,p.y,5,0,Math.PI*2);
      ctx.fillStyle=color; ctx.fill();
      ctx.strokeStyle='#0A0A0A'; ctx.lineWidth=2; ctx.stroke();
    });
    ctx.fillStyle=color; ctx.font='bold 11px -apple-system'; ctx.textAlign='center';
    vpts.forEach((p,i) => { const v=values[pts.indexOf(p)]; ctx.fillText(Math.round(v),p.x,p.y-10); });
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
</script>
